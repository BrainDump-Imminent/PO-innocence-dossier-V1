<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0c10">
<title>案件档案 — 所有现役卷宗</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Oswald:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #e8dcc8;
    --ink-dim: #a09070;
    --paper: #0a0c10;
    --card: #0f1218;
    --card2: #141820;
    --border: rgba(200,170,100,0.12);
    --border-hot: rgba(200,60,40,0.5);
    --red: #c82030;
    --red-dim: rgba(200,32,48,0.12);
    --amber: #c8901a;
    --amber-dim: rgba(200,144,26,0.1);
    --green: #1a7a40;
    --scan: rgba(200,170,100,0.02);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Courier Prime', monospace;
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
    -webkit-text-size-adjust: 100%;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      var(--scan) 2px, var(--scan) 3px
    );
    pointer-events: none; z-index: 9999;
  }

  body::after {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 70% 50% at 20% 10%, rgba(200,32,48,0.04) 0, transparent 60%),
      radial-gradient(ellipse 50% 60% at 80% 90%, rgba(200,144,26,0.03) 0, transparent 60%);
    pointer-events: none; z-index: 0;
  }

  .wrap { max-width: 1300px; margin: 0 auto; padding: 48px 24px 80px; padding-left: max(24px, env(safe-area-inset-left)); padding-right: max(24px, env(safe-area-inset-right)); position: relative; z-index: 1; }

  /* ── HEADER ── */
  .dossier-header {
    text-align: center;
    margin-bottom: 72px;
    position: relative;
  }
  .dossier-header::after {
    content: '';
    display: block;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--red) 30%, var(--amber) 70%, transparent);
    margin-top: 40px;
  }
  .stamp {
    display: inline-block;
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--red);
    border: 2px solid var(--red);
    padding: 5px 18px;
    border-radius: 2px;
    margin-bottom: 28px;
    opacity: 0.85;
    transform: rotate(-1.5deg);
    display: inline-block;
    position: relative;
  }
  .stamp::before {
    content: '';
    position: absolute; inset: 3px;
    border: 1px solid var(--red);
    opacity: 0.4;
  }
  .dossier-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(36px, 6vw, 72px);
    font-weight: 900;
    letter-spacing: -0.02em;
    line-height: 1;
    color: var(--ink);
    text-shadow: 0 0 60px rgba(200,32,48,0.15);
  }
  .dossier-header h1 em {
    font-style: italic;
    color: var(--red);
  }
  .dossier-sub {
    margin-top: 16px;
    font-size: 12px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-dim);
  }
  .case-count {
    display: inline-flex; gap: 28px;
    margin-top: 20px;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--ink-dim);
  }
  .case-count span { color: var(--amber); }

  /* ── SECTION DIVIDER ── */
  .section-label {
    display: flex; align-items: center; gap: 18px;
    margin: 64px 0 32px;
  }
  .section-label::before, .section-label::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(90deg, transparent, var(--border));
  }
  .section-label::after { background: linear-gradient(90deg, var(--border), transparent); }
  .section-label-text {
    font-family: 'Oswald', sans-serif;
    font-weight: 300;
    font-size: 11px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--amber);
    white-space: nowrap;
  }

  /* ── CASE GRID ── */
  .cases-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(560px, 1fr));
    gap: 28px;
  }

  /* ── CASE CARD ── */
  .case-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 3px;
    overflow: hidden;
    position: relative;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .case-card:hover {
    border-color: rgba(200,144,26,0.3);
    box-shadow: 0 8px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(200,144,26,0.08) inset;
  }
  .case-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--red), var(--amber));
  }

  .case-header {
    display: flex; align-items: flex-start; justify-content: space-between;
    padding: 22px 24px 16px;
    border-bottom: 1px solid var(--border);
    gap: 16px;
  }
  .case-num-badge {
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--paper);
    background: var(--red);
    padding: 3px 10px;
    border-radius: 1px;
    flex-shrink: 0;
    margin-top: 3px;
  }
  .case-num-badge.cc { background: var(--amber); color: #0a0c10; }
  .case-title-block { flex: 1; }
  .case-title {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    line-height: 1.2;
    color: var(--ink);
    margin-bottom: 3px;
  }
  .case-title-en {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-dim);
    font-style: italic;
  }
  .diff-badge {
    font-family: 'Oswald', sans-serif;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.2em;
    padding: 2px 8px;
    border-radius: 1px;
    flex-shrink: 0;
    margin-top: 3px;
    text-transform: uppercase;
  }
  .diff-EXPERT { border: 1px solid rgba(200,32,48,0.5); color: var(--red); }
  .diff-ADVANCED { border: 1px solid rgba(200,144,26,0.4); color: var(--amber); }
  .diff-STANDARD { border: 1px solid rgba(100,180,100,0.4); color: #5ab870; }
  .diff-COLD { border: 1px solid rgba(100,150,200,0.4); color: #6aabe0; }

  .case-teaser {
    padding: 16px 24px 20px;
    font-size: 13.5px;
    line-height: 1.75;
    color: #b8a888;
    border-bottom: 1px solid var(--border);
  }
  .case-teaser::first-letter {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    font-weight: 700;
    float: left;
    line-height: 0.85;
    margin: 4px 6px 0 0;
    color: var(--red);
  }

  /* ── SUSPECTS SECTION ── */
  .suspects-label {
    padding: 12px 24px 10px;
    font-size: 9.5px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--ink-dim);
    display: flex; align-items: center; gap: 12px;
  }
  .suspects-label::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  .suspects-row {
    display: flex; gap: 0;
    padding: 0 16px 20px;
    gap: 12px;
  }

  /* ── SUSPECT CARD ── */
  .suspect-card {
    flex: 1;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 14px;
    position: relative;
    min-width: 0;
  }
  .suspect-card::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(200,144,26,0.03) 0, transparent 60%);
    pointer-events: none;
  }

  /* ── MUGSHOT ── */
  .mugshot-wrap {
    flex-shrink: 0;
    position: relative;
    width: 80px;
  }
  .mugshot-frame {
    width: 80px;
    height: 88px;
    background: #0d1018;
    border: 2px solid rgba(200,170,100,0.2);
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }
  .mugshot-frame::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(200,32,48,0.08) 0, transparent 40%);
  }
  .mugshot-ruler {
    position: absolute; right: 0; top: 0; bottom: 0;
    width: 9px;
    background: repeating-linear-gradient(
      180deg,
      rgba(200,170,100,0.15) 0px, rgba(200,170,100,0.15) 1px,
      transparent 1px, transparent 8px
    );
    border-left: 1px solid rgba(200,170,100,0.15);
  }
  .mugshot-canvas {
    image-rendering: pixelated;
    display: block;
    width: 64px;
    height: 64px;
  }
  .mugshot-label {
    text-align: center;
    font-size: 7.5px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--ink-dim);
    margin-top: 5px;
    font-family: 'Oswald', sans-serif;
    font-weight: 300;
  }

  /* ── SUSPECT INFO ── */
  .suspect-info { flex: 1; min-width: 0; }
  .suspect-name {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .suspect-role {
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--amber);
    text-transform: uppercase;
    margin-bottom: 10px;
    font-family: 'Oswald', sans-serif;
    font-weight: 300;
  }
  .suspect-desc {
    font-size: 11.5px;
    line-height: 1.7;
    color: #8a7a5a;
    font-style: italic;
  }

  /* ── REDACTED CORNER ── */
  .redacted-corner {
    position: absolute;
    bottom: 12px; right: 12px;
    width: 28px; height: 28px;
    border-bottom: 2px solid rgba(200,32,48,0.2);
    border-right: 2px solid rgba(200,32,48,0.2);
  }

  /* ── DECLASSIFIED STAMP ── */
  .case-stamp {
    position: absolute;
    top: 18px; right: 18px;
    font-family: 'Oswald', sans-serif;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.3em;
    color: var(--red);
    border: 1px solid rgba(200,32,48,0.25);
    padding: 2px 6px;
    opacity: 0.5;
    transform: rotate(8deg);
  }

  /* ── RESPONSIVE ── */

  /* Tablet: collapse to single column */
  @media (max-width: 700px) {
    .cases-grid {
      grid-template-columns: 1fr;
      gap: 20px;
    }
  }

  /* Mobile: comprehensive layout fixes */
  @media (max-width: 500px) {
    /* Wrapper */
    .wrap {
      padding: 28px 14px 56px;
    }

    /* Header */
    .dossier-header {
      margin-bottom: 40px;
    }
    .dossier-header::after {
      margin-top: 28px;
    }
    .stamp {
      font-size: 9px;
      letter-spacing: 0.2em;
      padding: 4px 12px;
      margin-bottom: 18px;
    }
    .dossier-sub {
      font-size: 10px;
      letter-spacing: 0.1em;
    }
    .case-count {
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px 20px;
      font-size: 10px;
    }

    /* Section dividers */
    .section-label {
      margin: 40px 0 20px;
    }
    .section-label-text {
      font-size: 9px;
      letter-spacing: 0.25em;
    }

    /* Case card header: stack badge+diff on top, title below */
    .case-header {
      flex-wrap: wrap;
      padding: 16px 16px 12px;
      gap: 10px;
    }
    .case-title-block {
      order: 3;
      flex-basis: 100%;
    }
    .case-num-badge {
      order: 1;
      font-size: 10px;
    }
    .diff-badge {
      order: 2;
      margin-top: 0;
      margin-left: auto;
    }
    .case-title {
      font-size: 18px;
    }
    .case-title-en {
      font-size: 10px;
      letter-spacing: 0.1em;
    }

    /* Teaser */
    .case-teaser {
      padding: 14px 16px 16px;
      font-size: 13px;
      line-height: 1.7;
    }
    .case-teaser::first-letter {
      font-size: 20px;
    }

    /* Suspects section */
    .suspects-label {
      padding: 10px 16px 8px;
      font-size: 9px;
      letter-spacing: 0.25em;
    }
    .suspects-row {
      flex-direction: column;
      padding: 0 12px 16px;
      gap: 10px;
    }

    /* Suspect card */
    .suspect-card {
      padding: 12px;
      gap: 12px;
    }

    /* Mugshot — slightly smaller to give text more room */
    .mugshot-wrap { width: 68px; }
    .mugshot-frame {
      width: 68px;
      height: 76px;
    }
    .mugshot-canvas {
      width: 54px;
      height: 54px;
    }
    .mugshot-label {
      font-size: 7px;
    }

    /* Suspect info — allow name to wrap */
    .suspect-name {
      font-size: 14px;
      white-space: normal;
      overflow: visible;
      text-overflow: unset;
    }
    .suspect-role {
      font-size: 9px;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }
    .suspect-desc {
      font-size: 11px;
      line-height: 1.65;
    }
  }

  /* Very small phones */
  @media (max-width: 360px) {
    .wrap { padding: 20px 12px 48px; }
    .case-title { font-size: 16px; }
    .mugshot-wrap, .mugshot-frame { width: 60px; }
    .mugshot-frame { height: 68px; }
    .mugshot-canvas { width: 48px; height: 48px; }
  }
</style>
</head>

<div class="wrap">

  <!-- HEADER -->
  <div class="dossier-header">
    <div class="stamp">&#9632; 机密情报档案 &#9632;</div>
    <h1>案件 <em>档案</em></h1>
    <div class="dossier-sub">刑事调查部门 — 现役与冷案卷宗</div>

  <div class="section-label"><span class="section-label-text">案件016–020 · 国际卷宗</span></div>
  <div class="cases-grid" id="grid-4"></div>

  <!-- COLD CASES -->
  <div class="section-label"><span class="section-label-text">冷案档案 · 未侦破</span></div>
  <div class="cases-grid" id="grid-cc"></div>

</div>

function drawSprite(canvas, key, scale) {
  const rows = DATA[key];
  const pal  = PAL[key];
  if (!rows || !pal) return;
  canvas.width = 32; canvas.height = 32;
  canvas.style.width  = (32 * scale) + 'px';
  canvas.style.height = (32 * scale) + 'px';
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  ctx.clearRect(0, 0, 32, 32);
  for (let r = 0; r < 32; r++) {
    const row = rows[r] || '';
    for (let c = 0; c < 32; c++) {
      const col = pal[row[c] || '_'];
      if (col) { ctx.fillStyle = col; ctx.fillRect(c, r, 1, 1); }
    }
  }
}

// ─── RENDER ──────────────────────────────────────────────────
function diffClass(d) {
  if (d === 'COLD') return 'COLD';
  return d.toUpperCase();
}

const DIFF_LABELS = {
  'EXPERT': '专家级',
  'ADVANCED': '进阶级',
  'STANDARD': '标准级',
  'COLD': '冷案'
};

function buildCard(c) {
  const numCC = c.group === 'cc';
  const numBadgeClass = numCC ? 'case-num-badge cc' : 'case-num-badge';
  const diffKey = c.diff.includes('COLD') ? 'COLD' : c.diff;
  const canvasId0 = `spr-${c.num}-0`;
  const canvasId1 = `spr-${c.num}-1`;

  return `
    <div class="case-card">
      <div class="case-header">
        <span class="${numBadgeClass}">卷宗 ${c.num}</span>
        <div class="case-title-block">
          <div class="case-title">${c.title}</div>
          <div class="case-title-en">${c.titleEn}</div>
        </div>
        <span class="diff-badge diff-${diffKey}">${DIFF_LABELS[diffKey] || c.diff}</span>
      </div>
      <div class="case-teaser">${c.teaser}</div>
      <div class="suspects-label">嫌疑人</div>
      <div class="suspects-row">
        ${c.suspects.map((s, i) => `
          <div class="suspect-card">
            <div class="mugshot-wrap">
              <div class="mugshot-frame">
                <div class="mugshot-ruler"></div>
                <canvas id="${i===0?canvasId0:canvasId1}" class="mugshot-canvas" data-sprite="${s.sprite}"></canvas>
              </div>
              <div class="mugshot-label">嫌疑人${i===0?'甲':'乙'}</div>
            </div>
            <div class="suspect-info">
              <div class="suspect-name">${s.name}</div>
              <div class="suspect-role">${s.role}</div>
              <div class="suspect-desc">${s.desc}</div>
            </div>
            <div class="redacted-corner"></div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

// Populate grids
const grids = {
  '1': document.getElementById('grid-1'),
  '2': document.getElementById('grid-2'),
  'cc': document.getElementById('grid-cc'),
  '3': document.getElementById('grid-3'),
  '4': document.getElementById('grid-4'),
};

CASES.forEach(c => {
  grids[c.group].insertAdjacentHTML('beforeend', buildCard(c));
});

// Render all sprites
document.querySelectorAll('canvas[data-sprite]').forEach(canvas => {
  const key = canvas.dataset.sprite;
  drawSprite(canvas, key, 2);
});
